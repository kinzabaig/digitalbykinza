<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DigitalByKinza</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Poppins;
background:#020617;
color:white;
}

/* NAV */
header{
position:fixed;
top:0;
width:100%;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(2,6,23,0.9);
z-index:1000;
}

nav a{
margin:0 15px;
color:#cbd5e1;
text-decoration:none;
}

.cta{
background:#ec4899;
padding:10px 18px;
border-radius:8px;
color:white;
}

/* HERO */
.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:space-between;
padding:120px 8%;
gap:40px;
}

.hero-left h1{
font-size:64px;
line-height:1.2;
}

.hero-left span{
color:#ec4899;
}

.hero-left p{
color:#94a3b8;
margin-top:20px;
font-size:18px;
max-width:500px;
}

/* BUTTON */
.btn{
background:#ec4899;
padding:14px 28px;
border-radius:10px;
display:inline-block;
margin-top:30px;
font-weight:600;
box-shadow:0 0 30px rgba(236,72,153,0.6);
transition:0.3s;
}

.btn:hover{
transform:translateY(-5px);
box-shadow:0 0 60px rgba(236,72,153,1);
}

/* IMAGE SIDE */
.hero-right{
width:520px;
height:320px;
border-radius:18px;
background:
linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25)),
url('https://images.unsplash.com/photo-1677442136019-21780ecad995?q=80&w=1600&auto=format&fit=crop');
background-size:cover;
background-position:center;
box-shadow:0 0 80px rgba(59,130,246,0.4);
transition:0.4s;
}

/* HOVER EFFECT */
.hero-right:hover{
transform:scale(1.04);
box-shadow:0 0 120px rgba(59,130,246,0.9);
}

/* RESPONSIVE */
@media(max-width:900px){
.hero{
flex-direction:column;
text-align:center;
}

.hero-right{
width:100%;
}
}
</style>

</head>

<body>

<header>
<h2>DIGITALBYKINZA</h2>
<nav>
<a href="#">Work</a>
<a href="#">Services</a>
<a href="#">Process</a>
<a href="#">Reviews</a>
<a href="#" class="cta">Book a Call</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">

<div class="hero-left">
<h1>
Most SaaS Video <br>
Agencies Blend In <br>
<span>Yours Won’t.</span>
</h1>

<p>
We create high-converting SaaS videos that turn viewers into users.
</p>

<a href="#" class="btn">Book a Call</a>
</div>

<div class="hero-right"></div>

</section>

</body>
</html>
